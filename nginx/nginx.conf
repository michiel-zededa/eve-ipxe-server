worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;                         # writable by non-root

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Temp paths inside /tmp so nginx works without root
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # Large artifact files — disable output buffering so nginx streams directly.
    proxy_buffering off;

    # Allow large file transfers (installer ISOs can be 600 MB+)
    client_max_body_size 0;

    # gzip is counter-productive for already-compressed binary artifacts
    gzip off;

    server {
        listen 80;
        server_name _;

        # ── Health check (used by compose healthcheck) ─────────────────────
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # ── Artifact files ─────────────────────────────────────────────────
        # Served from the shared `artifacts` Docker volume mounted at
        # /usr/share/nginx/artifacts inside the nginx container.
        location /artifacts/ {
            alias /usr/share/nginx/artifacts/;

            # Directory listing disabled — the web UI drives navigation.
            autoindex off;

            # Efficient large-file delivery
            sendfile on;
            sendfile_max_chunk 1m;
            aio threads;

            # Allow cross-origin requests so the browser wizard can HEAD/fetch
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";

            # Cache-control: artifacts are immutable once downloaded
            add_header Cache-Control "public, max-age=86400, immutable";

            # Support byte-range requests (useful for resuming large downloads)
            add_header Accept-Ranges bytes;
        }

        # ── Catch-all: return 404 ──────────────────────────────────────────
        location / {
            return 404;
        }
    }
}
